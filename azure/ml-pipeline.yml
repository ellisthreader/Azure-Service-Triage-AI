$schema: https://azuremlschemas.azureedge.net/latest/pipelineJob.schema.json
type: pipeline
display_name: azure-council-case-priority-training
description: >
  Starter Azure ML pipeline for the fictional council case-prioritisation
  model. The first two steps call the current local ML scripts; later steps
  package governance artifacts for model registry review.
experiment_name: azure-council-case-priority

settings:
  default_compute: azureml:cpu-cluster
  continue_on_step_failure: false
  force_rerun: false

inputs:
  high_priority_recall_floor: 0.75
  fairness_gap_warning: 0.10

outputs:
  trained_model:
    type: uri_folder
  evaluation_report:
    type: uri_folder
  model_card:
    type: uri_file

jobs:
  generate_synthetic_data:
    type: command
    display_name: Generate synthetic council case data
    code: ../ml
    environment:
      image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu22.04:latest
      conda_file:
        channels:
          - conda-forge
        dependencies:
          - python=3.11
          - pip
          - pip:
              - pandas>=2.2,<3
              - numpy>=1.26,<3
    command: |
      python generate_data.py
      mkdir -p ${{outputs.dataset}}
      cp data/synthetic_cases.csv ${{outputs.dataset}}/synthetic_cases.csv
    outputs:
      dataset:
        type: uri_folder

  train_model:
    type: command
    display_name: Train case priority classifier
    code: ../ml
    environment:
      image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu22.04:latest
      conda_file:
        channels:
          - conda-forge
        dependencies:
          - python=3.11
          - pip
          - pip:
              - pandas>=2.2,<3
              - numpy>=1.26,<3
              - scikit-learn>=1.4,<2
              - joblib>=1.3,<2
    inputs:
      dataset: ${{parent.jobs.generate_synthetic_data.outputs.dataset}}
    outputs:
      model_artifacts: ${{parent.outputs.trained_model}}
      metrics:
        type: uri_folder
    command: |
      mkdir -p data
      cp ${{inputs.dataset}}/synthetic_cases.csv data/synthetic_cases.csv
      python train_model.py
      mkdir -p ${{outputs.model_artifacts}} ${{outputs.metrics}}
      cp -r artifacts/* ${{outputs.model_artifacts}}/
      cp artifacts/evaluation.json ${{outputs.metrics}}/evaluation.json
      cp artifacts/model_metadata.json ${{outputs.metrics}}/model_metadata.json

  evaluate_model:
    type: command
    display_name: Evaluate quality, fairness, and deployment gates
    code: ../ml
    environment:
      image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu22.04:latest
      conda_file:
        channels:
          - conda-forge
        dependencies:
          - python=3.11
    inputs:
      metrics: ${{parent.jobs.train_model.outputs.metrics}}
      model_artifacts: ${{parent.jobs.train_model.outputs.model_artifacts}}
    outputs:
      report: ${{parent.outputs.evaluation_report}}
      model_card: ${{parent.outputs.model_card}}
    command: |
      python - <<'PY'
      from pathlib import Path
      import json
      metrics_dir = Path("${{inputs.metrics}}")
      report_dir = Path("${{outputs.report}}")
      model_card_path = Path("${{outputs.model_card}}")
      report_dir.mkdir(parents=True, exist_ok=True)
      model_card_path.parent.mkdir(parents=True, exist_ok=True)

      evaluation = json.loads((metrics_dir / "evaluation.json").read_text(encoding="utf-8"))
      metadata = json.loads((metrics_dir / "model_metadata.json").read_text(encoding="utf-8"))
      high_recall_floor = float("${{parent.inputs.high_priority_recall_floor}}")
      fairness_gap_warning = float("${{parent.inputs.fairness_gap_warning}}")
      high_recall = float(evaluation.get("classification_report", {}).get("high", {}).get("recall", 0.0))

      gate_summary = {
          "model_name": metadata.get("model_name"),
          "model_version": metadata.get("model_version"),
          "accuracy": evaluation.get("accuracy"),
          "high_priority_recall": high_recall,
          "high_priority_recall_floor": high_recall_floor,
          "high_priority_recall_gate": "pass" if high_recall >= high_recall_floor else "review",
          "fairness_gap_warning": fairness_gap_warning,
          "fairness_status": "not_available_until_slice_metrics_are_implemented",
          "human_review_required": True,
          "data": "synthetic",
      }
      (report_dir / "gate_summary.json").write_text(json.dumps(gate_summary, indent=2), encoding="utf-8")
      (report_dir / "evaluation.json").write_text(json.dumps(evaluation, indent=2), encoding="utf-8")
      model_card_path.write_text(
          "# Azure Council Case Priority Model Card\n\n"
          f"- Model: {metadata.get('model_name')}\n"
          f"- Version: {metadata.get('model_version')}\n"
          f"- Accuracy: {evaluation.get('accuracy')}\n"
          f"- High priority recall: {high_recall}\n"
          "- Intended use: advisory prioritisation for fictional council cases with human review.\n"
          "- Limitations: synthetic data, baseline model, fairness slice metrics pending.\n"
          "- Not for: automated denial, eligibility decisions, or live resident services without governance approval.\n",
          encoding="utf-8",
      )
      PY

  prepare_registry_candidate:
    type: command
    display_name: Prepare model registry candidate metadata
    code: ../ml
    environment:
      image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu22.04:latest
      conda_file:
        channels:
          - conda-forge
        dependencies:
          - python=3.11
    inputs:
      model_artifacts: ${{parent.jobs.train_model.outputs.model_artifacts}}
      report: ${{parent.jobs.evaluate_model.outputs.report}}
      model_card: ${{parent.jobs.evaluate_model.outputs.model_card}}
    outputs:
      registry_metadata:
        type: uri_folder
    command: |
      python - <<'PY'
      from pathlib import Path
      import json
      output_dir = Path("${{outputs.registry_metadata}}")
      output_dir.mkdir(parents=True, exist_ok=True)

      tags = {
          "project": "azure-council",
          "use_case": "case-prioritisation",
          "data": "synthetic",
          "model_framework": "scikit-learn",
          "model_format": "joblib",
          "human_review_required": "true",
          "responsible_ai_review": "pending",
      }
      (output_dir / "model-tags.json").write_text(json.dumps(tags, indent=2), encoding="utf-8")
      (output_dir / "register-model.sh").write_text(
          "az ml model create \\\n"
          "  --name azure-council-case-priority \\\n"
          "  --type custom_model \\\n"
          "  --path azureml://jobs/<job-name>/outputs/artifacts/paths/trained_model \\\n"
          "  --tags project=azure-council data=synthetic human_review_required=true\n",
          encoding="utf-8",
      )
      PY
