$schema: https://azuremlschemas.azureedge.net/latest/pipelineJob.schema.json
type: pipeline
display_name: service-priority-ai-training
description: >
  Azure ML pipeline for the Service Priority AI model. It generates synthetic
  data, trains the model, evaluates deployment gates, and packages model
  registry metadata for review.
experiment_name: service-priority-ai

settings:
  default_compute: azureml:cpu-cluster
  continue_on_step_failure: false
  force_rerun: false

inputs:
  high_priority_recall_floor: 0.75
  fairness_gap_warning: 0.10

outputs:
  trained_model:
    type: uri_folder
  evaluation_report:
    type: uri_folder
  model_card:
    type: uri_file

jobs:
  generate_synthetic_data:
    type: command
    display_name: Generate synthetic service request data
    code: ../ml
    environment: azureml:service-priority-training:1
    command: |
      python generate_data.py
      mkdir -p ${{outputs.dataset}}
      cp data/synthetic_cases.csv ${{outputs.dataset}}/synthetic_cases.csv
    outputs:
      dataset:
        type: uri_folder

  train_model:
    type: command
    display_name: Train case priority classifier
    code: ../ml
    environment: azureml:service-priority-training:1
    inputs:
      dataset: ${{parent.jobs.generate_synthetic_data.outputs.dataset}}
    outputs:
      model_artifacts: ${{parent.outputs.trained_model}}
      metrics:
        type: uri_folder
    command: |
      mkdir -p data
      cp ${{inputs.dataset}}/synthetic_cases.csv data/synthetic_cases.csv
      python train_model.py
      mkdir -p ${{outputs.model_artifacts}} ${{outputs.metrics}}
      cp -r artifacts/* ${{outputs.model_artifacts}}/
      cp artifacts/evaluation.json ${{outputs.metrics}}/evaluation.json
      cp artifacts/model_metadata.json ${{outputs.metrics}}/model_metadata.json

  evaluate_model:
    type: command
    display_name: Evaluate quality, fairness, and deployment gates
    code: ../ml
    environment: azureml:service-priority-training:1
    inputs:
      dataset: ${{parent.jobs.generate_synthetic_data.outputs.dataset}}
      model_artifacts: ${{parent.jobs.train_model.outputs.model_artifacts}}
    outputs:
      report: ${{parent.outputs.evaluation_report}}
      model_card: ${{parent.outputs.model_card}}
    command: |
      mkdir -p data artifacts
      cp ${{inputs.dataset}}/synthetic_cases.csv data/synthetic_cases.csv
      cp -r ${{inputs.model_artifacts}}/* artifacts/
      python evaluate_model.py
      mkdir -p ${{outputs.report}}
      cp artifacts/evaluation.json ${{outputs.report}}/evaluation.json
      cp artifacts/gate_summary.json ${{outputs.report}}/gate_summary.json
      cp artifacts/registry_tags.json ${{outputs.report}}/registry_tags.json
      cat > ${{outputs.model_card}} <<'EOF'
      # Service Priority AI Model Card

      This model is a synthetic-data demonstration for human-reviewed service
      request prioritisation. Review `gate_summary.json`, `evaluation.json`,
      Responsible AI dashboard outputs, and project governance docs before any
      deployment beyond a demo workspace.
      EOF

  prepare_registry_candidate:
    type: command
    display_name: Prepare model registry candidate metadata
    code: ../ml
    environment: azureml:service-priority-training:1
    inputs:
      model_artifacts: ${{parent.jobs.train_model.outputs.model_artifacts}}
      report: ${{parent.jobs.evaluate_model.outputs.report}}
      model_card: ${{parent.jobs.evaluate_model.outputs.model_card}}
    outputs:
      registry_metadata:
        type: uri_folder
    command: |
      python - <<'PY'
      from pathlib import Path
      import json
      output_dir = Path("${{outputs.registry_metadata}}")
      output_dir.mkdir(parents=True, exist_ok=True)

      tags = {
          "project": "service-priority-ai",
          "use_case": "service-request-prioritisation",
          "data": "synthetic",
          "model_framework": "scikit-learn",
          "model_format": "joblib",
          "human_review_required": "true",
          "responsible_ai_review": "pending",
      }
      (output_dir / "model-tags.json").write_text(json.dumps(tags, indent=2), encoding="utf-8")
      (output_dir / "register-model.sh").write_text(
          "az ml model create \\\n"
          "  --name service-priority-ai \\\n"
          "  --type custom_model \\\n"
          "  --path azureml://jobs/<job-name>/outputs/artifacts/paths/trained_model \\\n"
          "  --tags project=service-priority-ai data=synthetic human_review_required=true\n",
          encoding="utf-8",
      )
      PY
