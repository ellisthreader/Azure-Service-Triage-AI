$schema: https://azuremlschemas.azureedge.net/latest/environment.schema.json
name: service-priority-batch
version: "2"
description: Batch scoring environment for Service Priority AI.
image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu22.04:latest
conda_file:
  channels:
    - conda-forge
  dependencies:
    - python=3.11
    - pip
    - pip:
        - pandas==2.2.3
        - numpy==2.2.1
        - scikit-learn==1.6.0
        - joblib==1.4.2
